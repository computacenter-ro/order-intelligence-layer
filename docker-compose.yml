# Order Intelligence Layer — infrastructure
# Usage: docker compose up -d
# Python services and the dashboard run natively in dev (see CLAUDE.md).

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: oil-rabbitmq
    ports:
      - "5672:5672"     # AMQP -> amqp://guest:guest@localhost:5672/ (image default)
      - "15672:15672"   # management UI -> http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: oil-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: oil-postgres
    ports:
      - "5432:5432"
    environment:
      # Sourced from .env (gitignored); defaults keep local dev zero-config.
      # Keep these in sync with DATABASE_URL in .env / settings.
      POSTGRES_USER: ${POSTGRES_USER:-oil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oil}
      POSTGRES_DB: ${POSTGRES_DB:-oil}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oil -d oil"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Python apps (share one image; differ only in `command`) --------------
  # Enable with: docker compose --profile app up -d
  # (Left in a profile so `docker compose up -d` alone still starts infra only,
  # preserving the native-dev workflow.)

  # Migrations run once, then exit. Everything that touches the DB waits on it.
  migrate:
    profiles: ["app"]
    build: .
    image: oil-app
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oil}:${POSTGRES_PASSWORD:-oil}@postgres:5432/${POSTGRES_DB:-oil}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  collector:
    profiles: ["app"]
    build: .
    image: oil-app
    command: uvicorn pipeline.mock_es.app:app --host 0.0.0.0 --port 9200
    ports:
      - "9200:9200"

  mock-services:
    profiles: ["app"]
    image: oil-app
    command: python -m pipeline.services.run_all
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ES_URL: http://collector:9200
    depends_on:
      rabbitmq:
        condition: service_healthy
      collector:
        condition: service_started

  ai-service:
    profiles: ["app"]
    image: oil-app
    command: python -m ai_service.main
    environment:
      ES_URL: http://collector:9200
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # /summarize-journey must be reachable by the backend container.
      API_HOST: 0.0.0.0
      # Azure creds come from .env (unset => LLM fallback mode).
      AZURE_AI_FOUNDRY_ENDPOINT: ${AZURE_AI_FOUNDRY_ENDPOINT:-}
      AZURE_AI_FOUNDRY_API_KEY: ${AZURE_AI_FOUNDRY_API_KEY:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_EXPLAINER: ${AZURE_AI_FOUNDRY_DEPLOYMENT_EXPLAINER:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_ROUTER: ${AZURE_AI_FOUNDRY_DEPLOYMENT_ROUTER:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_SUMMARY: ${AZURE_AI_FOUNDRY_DEPLOYMENT_SUMMARY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      collector:
        condition: service_started

  backend:
    profiles: ["app"]
    image: oil-app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oil}:${POSTGRES_PASSWORD:-oil}@postgres:5432/${POSTGRES_DB:-oil}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # Reserved: the backend does NOT yet call /summarize-journey (see the TODO
      # in backend/journeys.py — summary is currently left None). Pre-wired by
      # service name so the integration works once that call is added.
      AI_SERVICE_URL: http://ai-service:8100
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # --- Uncomment for prod-like/demo runs once the frontend is built ---------
  # dashboard:
  #   profiles: ["app"]
  #   build:
  #     context: ./dashboard
  #     args:
  #       NPM_TOKEN: ${NPM_TOKEN}
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
  #     NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8000/ws

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data: