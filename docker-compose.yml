# Order Intelligence Layer — infrastructure
# Usage: docker compose up -d
# Python services and the dashboard run natively in dev (see CLAUDE.md).

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: oil-rabbitmq
    ports:
      - "5672:5672"     # AMQP -> amqp://guest:guest@localhost:5672/ (image default)
      - "15672:15672"   # management UI -> http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: oil-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: oil-postgres
    ports:
      - "5432:5432"
    environment:
      # Sourced from .env (gitignored); defaults keep local dev zero-config.
      # Keep these in sync with DATABASE_URL in .env / settings.
      POSTGRES_USER: ${POSTGRES_USER:-oil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oil}
      POSTGRES_DB: ${POSTGRES_DB:-oil}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oil -d oil"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Python apps (share one image; differ only in `command`) --------------
  # Enable with: docker compose --profile app up -d
  # (Left in a profile so `docker compose up -d` alone still starts infra only,
  # preserving the native-dev workflow.)

  # Migrations run once, then exit. Everything that touches the DB waits on it.
  migrate:
    profiles: ["app"]
    build: .
    image: oil-app
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oil}:${POSTGRES_PASSWORD:-oil}@postgres:5432/${POSTGRES_DB:-oil}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  collector:
    profiles: ["app"]
    build: .
    image: oil-app
    command: uvicorn pipeline.mock_es.app:app --host 0.0.0.0 --port 9200
    ports:
      - "9200:9200"

  mock-services:
    profiles: ["app"]
    image: oil-app
    # Auto-restart if it loses the RabbitMQ startup race (the initial AMQP
    # connection doesn't retry; depends_on:service_healthy narrows but doesn't
    # eliminate the window). on-failure => restarts on non-zero exit only.
    restart: on-failure
    command: python -m pipeline.services.run_all
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ES_URL: http://collector:9200
    depends_on:
      rabbitmq:
        condition: service_healthy
      collector:
        condition: service_started

  ai-service:
    profiles: ["app"]
    image: oil-app
    restart: on-failure          # same RabbitMQ startup-race guard as mock-services
    command: python -m ai_service.main
    environment:
      ES_URL: http://collector:9200
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # /summarize-journey must be reachable by the backend container.
      API_HOST: 0.0.0.0
      # Azure creds come from .env (unset => LLM fallback mode).
      AZURE_AI_FOUNDRY_ENDPOINT: ${AZURE_AI_FOUNDRY_ENDPOINT:-}
      AZURE_AI_FOUNDRY_API_KEY: ${AZURE_AI_FOUNDRY_API_KEY:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_EXPLAINER: ${AZURE_AI_FOUNDRY_DEPLOYMENT_EXPLAINER:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_ROUTER: ${AZURE_AI_FOUNDRY_DEPLOYMENT_ROUTER:-}
      AZURE_AI_FOUNDRY_DEPLOYMENT_SUMMARY: ${AZURE_AI_FOUNDRY_DEPLOYMENT_SUMMARY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      collector:
        condition: service_started

  backend:
    profiles: ["app"]
    image: oil-app
    restart: on-failure          # same RabbitMQ startup-race guard as mock-services
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oil}:${POSTGRES_PASSWORD:-oil}@postgres:5432/${POSTGRES_DB:-oil}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # Reserved: the backend does NOT yet call /summarize-journey (see the TODO
      # in backend/journeys.py — summary is currently left None). Pre-wired by
      # service name so the integration works once that call is added.
      AI_SERVICE_URL: http://ai-service:8100
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  dashboard:
    profiles: ["app"]
    build:
      context: ./dashboard
      # NPM_TOKEN is passed as a build SECRET (not an arg), so it never appears
      # in the build log or `docker history`. Sourced from the NPM_TOKEN env var
      # via the top-level `secrets:` block below. Put NPM_TOKEN in .env
      # (gitignored) — it's a GitHub PAT with read:packages for @computacenter-ro.
      secrets:
        - npm_token
    ports:
      - "3000:3000"
    environment:
      # These are BROWSER-side vars (the Next app runs in the user's browser),
      # so they must point at the host-published backend port, not the compose
      # service name. Names must match what the code reads (dashboard/lib).
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    depends_on:
      backend:
        condition: service_started

  # One-shot: fire the 10 scenarios once the app is already running. Separate
  # profile so `--profile app up` starts the system WITHOUT auto-firing; fire on
  # demand with:  docker compose --profile fire run --rm injector
  #
  # No `depends_on` here on purpose: the app services live in the `app` profile,
  # and a `depends_on` pointing at them makes `--profile fire run` fail with
  # "depends on undefined service" (those services aren't in scope when only the
  # `fire` profile is active). The injector is always run manually AFTER the
  # stack is up, so the ordering guarantee isn't needed — it publishes a baton
  # to RabbitMQ (already healthy) which the running mock services then consume.
  injector:
    profiles: ["fire"]
    image: oil-app
    command: python -m pipeline.injector.inject --all
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:

secrets:
  # The dashboard build reads this (GitHub Packages PAT) as a mounted secret,
  # never as a printed build arg. `environment:` sources it from the NPM_TOKEN
  # env var (set it in your shell or .env). Requires BuildKit (default in modern
  # Docker); Compose passes build secrets through automatically.
  npm_token:
    environment: NPM_TOKEN